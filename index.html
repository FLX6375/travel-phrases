<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Travel Phrases v23</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* fonts loaded via link tag */
:root {
  --bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3350;
  --accent:#4f8ef7;--accent2:#7c5cfc;--green:#3dd68c;--red:#f7706a;
  --yellow:#f7c948;--text:#e8ecf5;--muted:#6b7594;--tag-bg:#1e2d4a;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

header{background:linear-gradient(135deg,#0f1117 0%,#1a1d27 50%,#141824 100%);border-bottom:1px solid var(--border);padding:20px 24px 0;position:sticky;top:0;z-index:100;}
.header-inner{max-width:960px;margin:0 auto;}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
h1{font-size:1.3rem;font-weight:700;letter-spacing:-.02em;}
h1 span{color:var(--accent);}
.progress-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:12px;}
.progress-bar{height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
.progress-label{font-size:.75rem;color:var(--muted);margin-top:5px;padding-bottom:10px;}
.tabs{display:flex;gap:6px;max-width:960px;margin:0 auto;padding:10px 0 0;flex-wrap:wrap;}
.tab{padding:7px 14px;border-radius:8px 8px 0 0;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid var(--border);border-bottom:none;background:transparent;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--surface);border-color:var(--border);color:var(--text);}
.tab:hover:not(.active){color:var(--text);}

.filters{max-width:960px;margin:14px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 14px;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.filter-btn.active{border-color:var(--accent2);background:rgba(124,92,252,.15);color:var(--accent2);}

main{max-width:960px;margin:0 auto;padding:20px 24px 60px;}

.phrase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.phrase-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
.phrase-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.phrase-card.learned{border-color:var(--green);}
.phrase-card.learned::after{content:'✓';position:absolute;top:10px;right:12px;font-size:.8rem;color:var(--green);font-weight:700;}
.phrase-card.hard-mode{border-color:var(--red);background:rgba(247,112,106,0.03);}
.card-num{font-size:.7rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.card-en{font-size:1rem;font-weight:600;line-height:1.4;margin-bottom:4px;}
.card-en mark{background:rgba(247,201,72,0.2);color:var(--yellow);padding:0 2px;border-radius:3px;}
.card-ua{font-size:.85rem;color:#FFF;margin-bottom:10px;font-style:italic;}
.card-example{font-size:.8rem;color:#a0aacc;background:rgba(79,142,247,.07);border-left:2px solid var(--accent);padding:6px 10px;border-radius:0 6px 6px 0;line-height:1.5;}
.card-example-more{font-size:.7rem;color:var(--muted);margin-top:4px;}
.card-en-row,.modal-en-row,.quiz-q-row{display:flex;align-items:flex-start;gap:8px;}
.card-en-row .card-en,.modal-en-row>div:first-child,.quiz-q-row span{flex:1;min-width:0;}
.btn-speak{flex-shrink:0;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.35);color:var(--accent);border-radius:10px;padding:6px 10px;font-size:.95rem;cursor:pointer;line-height:1;transition:background .15s,transform .1s;}
.btn-speak:hover{background:rgba(79,142,247,.22);}
.btn-speak:active{transform:scale(.94);}
.btn-speak-sm{padding:4px 8px;font-size:.8rem;border-radius:8px;}
.examples-block{margin-bottom:14px;}
.examples-label{font-size:.78rem;color:var(--muted);margin-bottom:8px;font-weight:500;}
.example-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.example-item .example-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.example-item .example-text{flex:1;font-size:.9rem;color:#b0bada;line-height:1.6;}
.rule-why p{color:var(--yellow);background:rgba(247,201,72,.06);padding:10px 12px;border-radius:8px;border-left:3px solid var(--yellow);}
.card-tag{display:inline-block;margin-top:10px;font-size:.7rem;padding:2px 9px;background:var(--tag-bg);color:var(--accent);border-radius:10px;}
.card-situation{font-size:.72rem;color:var(--muted);margin-top:8px;font-style:italic;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:560px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
.modal-num{font-size:.75rem;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.modal-en{font-size:1.4rem;font-weight:700;line-height:1.3;margin-bottom:8px;}
.modal-en mark{background:rgba(247,201,72,0.25);color:var(--yellow);padding:0 4px;border-radius:4px;}
.modal-ua{font-size:1rem;color:var(--muted);margin-bottom:18px;}
.modal-example{font-size:.9rem;color:#b0bada;background:rgba(79,142,247,.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:14px;line-height:1.6;}
.modal-tip{font-size:.8rem;color:var(--muted);margin-bottom:10px;background:rgba(124,92,252,.08);padding:8px 12px;border-radius:8px;}
.modal-rule{font-size:.8rem;color:var(--yellow);margin-bottom:20px;background:rgba(247,201,72,.08);border:1px dashed var(--yellow);padding:8px 12px;border-radius:8px;}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap;}

.btn{padding:9px 20px;border-radius:10px;font-size:.85rem;font-weight:500;cursor:pointer;border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:var(--green);color:#000;}
.btn-ghost{background:var(--border);color:var(--text);}
.btn-nav{background:var(--card);border:1px solid var(--border);color:var(--text);padding:9px 14px;}
.btn-sm{padding:6px 12px;font-size:.78rem;}

/* QUIZ */
.quiz-wrap{max-width:640px;margin:0 auto;}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;text-align:center;}
.quiz-progress{font-size:.8rem;color:var(--muted);margin-bottom:16px;}
.quiz-q{font-size:1.25rem;font-weight:700;margin-bottom:8px;line-height:1.4;}
.quiz-hint{font-size:.85rem;color:var(--muted);margin-bottom:24px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.quiz-opt{padding:14px;border-radius:12px;background:var(--surface);border:2px solid var(--border);cursor:pointer;font-size:.88rem;transition:all .2s;text-align:center;line-height:1.4;}
.quiz-opt:hover:not(.disabled){border-color:var(--accent);background:rgba(79,142,247,.1);}
.quiz-opt.correct{border-color:var(--green);background:rgba(61,214,140,.12);color:var(--green);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(247,112,106,.1);color:var(--red);}
.quiz-opt.disabled{cursor:not-allowed;}
.quiz-feedback{min-height:40px;font-size:.9rem;margin-bottom:16px;line-height:1.5;padding:10px;border-radius:10px;text-align:left;}
.quiz-feedback.ok{color:var(--green);background:rgba(61,214,140,0.05);}
.quiz-feedback.fail{color:var(--text);background:rgba(247,112,106,0.08);border:1px dashed var(--red);}
.quiz-feedback.hint-ok{color:var(--yellow);background:rgba(247,201,72,.08);border:1px dashed var(--yellow);}
.quiz-options-bar{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.quiz-errors-toggle,.quiz-new-toggle{padding:8px 16px;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.quiz-errors-toggle.active{border-color:var(--red);background:rgba(247,112,106,.15);color:var(--red);}
.quiz-errors-toggle:hover{border-color:var(--red);color:var(--red);}
.quiz-new-toggle.active{border-color:#5bc0eb;background:rgba(91,192,235,.15);color:#5bc0eb;}
.quiz-new-toggle:hover{border-color:#5bc0eb;color:#5bc0eb;}
.quiz-size-wrap{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted);}
.quiz-size-select{padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.78rem;cursor:pointer;}
.timing-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;}
.timing-row:hover{background:var(--surface);border-color:var(--border);}
.timing-phrase{flex:1;font-size:.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timing-val{font-size:.82rem;color:var(--accent);min-width:48px;text-align:right;}
.timing-count{font-size:.72rem;color:var(--muted);min-width:28px;text-align:right;}
.phrase-img{width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:block;}
.phrase-img--card{max-height:72px;margin:0 0 10px;border-radius:8px;}
.phrase-img--modal{max-height:160px;margin-bottom:12px;}
.phrase-visual{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-align:center;overflow:hidden;}
.phrase-visual--card{height:52px;margin:0 0 10px;border-radius:8px;}
.phrase-visual--modal{height:110px;margin-bottom:12px;border-radius:10px;padding:8px 12px;}
.phrase-visual-emoji{line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35));}
.phrase-visual--card .phrase-visual-emoji{font-size:1.75rem;}
.phrase-visual--modal .phrase-visual-emoji{font-size:2.75rem;}
.phrase-visual-scene{font-size:.72rem;color:rgba(255,255,255,.82);line-height:1.35;max-height:2.7em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.dialogue-scene{font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:6px;display:block;}
.card-streak{font-size:.65rem;color:var(--yellow);margin-left:6px;}

/* CLOUD SYNC */
.sync-panel-inner{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.sync-help{font-size:.82rem;color:var(--muted);line-height:1.55;margin-bottom:14px;}
.sync-help code{font-size:.75rem;background:var(--tag-bg);padding:2px 6px;border-radius:4px;}
.sync-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sync-input{flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.85rem;}
.sync-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.sync-status{font-size:.78rem;color:var(--muted);min-height:1.2em;}
.sync-status.sync-ok{color:var(--green);}
.sync-status.sync-error{color:var(--red);}
.sync-status.sync-syncing{color:var(--accent);}
.quiz-score span{color:var(--accent);font-size:1.8rem;}
.quiz-type-select{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.quiz-type-btn{padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.76rem;transition:all .2s;}
.quiz-type-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* SCRAMBLE */
.scramble-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;min-height:50px;padding:10px;background:var(--surface);border-radius:12px;border:1px dashed var(--border);}
.scramble-word{padding:8px 14px;background:var(--card);border:1px solid var(--border);color:#fff;border-radius:8px;font-size:.9rem;cursor:pointer;user-select:none;transition:all 0.15s;}
.scramble-word:hover{border-color:var(--accent);color:#FFF;}
.scramble-word.used{opacity:0.2;cursor:default;pointer-events:none;}
.scramble-ans{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0;min-height:50px;padding:10px;background:rgba(79,142,247,0.03);border:2px solid var(--border);border-radius:12px;}
.scramble-ans .scramble-word{background:var(--tag-bg);border-color:var(--accent);color:#fff;}

/* TYPING */
.typing-area{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 16px;font-size:1rem;color:var(--text);font-family:'Inter',sans-serif;resize:none;outline:none;margin-bottom:14px;transition:border-color .2s;}
.typing-area:focus{border-color:var(--accent);}
.typing-area.correct-border{border-color:var(--green);}
.typing-area.wrong-border{border-color:var(--red);}
.hint-chars{font-family:'JetBrains Mono',monospace;font-size:1.1rem;letter-spacing:.15em;margin:10px 0 16px;color:var(--yellow);min-height:28px;}
.hint-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:.78rem;padding:4px 12px;border-radius:8px;cursor:pointer;}
.hint-btn:hover{border-color:var(--yellow);color:var(--yellow);}

/* DIALOGUE & SITUATION */
.dialogue-box{text-align:left;background:var(--surface);border-radius:12px;padding:16px;margin-bottom:20px;line-height:1.7;font-size:.9rem;}
.dialogue-line{margin-bottom:8px;}
.dialogue-line.speaker{color:var(--accent);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;}
.dialogue-blank{display:inline-block;min-width:120px;border-bottom:2px dashed var(--yellow);color:var(--yellow);padding:0 4px;}
.situation-badge{display:inline-block;background:rgba(124,92,252,.15);color:var(--accent2);padding:6px 14px;border-radius:20px;font-size:.82rem;margin-bottom:16px;}

/* FLASH RECALL */
.flash-card{min-height:120px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:600;padding:20px;transition:opacity .3s;}
.flash-card.hidden{opacity:0;}
.flash-timer{font-size:2rem;color:var(--accent);font-family:'JetBrains Mono',monospace;margin:16px 0;}

/* RULES PAGE */
.rules-intro{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px;line-height:1.6;font-size:.9rem;}
.rules-intro h2{font-size:1.1rem;margin-bottom:10px;color:var(--accent);}
.rules-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.rules-nav-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;}
.rules-nav-btn.active{border-color:var(--accent);background:rgba(79,142,247,.12);color:var(--accent);}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;cursor:pointer;transition:border-color .2s;}
.rule-card:hover,.rule-card.open{border-color:var(--accent);}
.rule-card-header{display:flex;align-items:flex-start;gap:12px;}
.rule-icon{font-size:1.5rem;flex-shrink:0;}
.rule-title{font-size:1rem;font-weight:600;margin-bottom:4px;}
.rule-template{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--yellow);background:rgba(247,201,72,.08);padding:6px 10px;border-radius:6px;display:inline-block;margin:8px 0;}
.rule-summary{font-size:.82rem;color:var(--muted);line-height:1.5;}
.rule-body{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.rule-card.open .rule-body{display:block;}
.rule-section{margin-bottom:14px;}
.rule-section h4{font-size:.78rem;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.rule-section p,.rule-section li{font-size:.85rem;color:var(--text);line-height:1.6;}
.rule-section ul{padding-left:18px;}
.rule-example{background:rgba(79,142,247,.06);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;margin:6px 0;font-size:.84rem;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.rule-mistake{background:rgba(247,112,106,.06);border-left:3px solid var(--red);padding:8px 12px;border-radius:0 8px 8px 0;margin:6px 0;font-size:.84rem;}
.rule-link-phrases{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
.rule-phrase-chip{font-size:.72rem;padding:4px 10px;background:var(--tag-bg);color:var(--accent);border-radius:8px;cursor:pointer;border:1px solid transparent;transition:border-color .2s;}
.rule-phrase-chip:hover{border-color:var(--accent);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;}
.stat-num{font-size:2rem;font-weight:700;color:var(--accent);}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:4px;}
.category-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cat-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;margin:0 14px;}
.cat-bar{height:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .6s ease;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}

@media(max-width:500px){
  .phrase-grid{grid-template-columns:1fr;}
  .quiz-options{grid-template-columns:1fr;}
  .modal{padding:22px 18px;}
  .quiz-type-select{gap:4px;}
  .tabs{gap:4px;}
}

</style>
<script src="./js/boot-guard.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <h1>✈️ Travel <span>Phrases</span></h1>
      <div style="font-size:.82rem;color:var(--muted)">Вивчено: <span id="learned-count">0</span> / <span id="total-count">0</span></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">Завантаження...</div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="browse" onclick="setTab('browse')">📚 Картки</button>
    <button class="tab" data-tab="rules" onclick="setTab('rules')">📖 Правила</button>
    <button class="tab" data-tab="quiz" onclick="setTab('quiz')">🧠 Тренажер</button>
    <button class="tab" data-tab="stats" onclick="setTab('stats')">📊 Прогрес</button>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Всі</button>
  <button class="filter-btn" data-filter="hotel" onclick="setFilter('hotel')">🏨 Готель</button>
  <button class="filter-btn" data-filter="street" onclick="setFilter('street')">🗺️ Вулиця</button>
  <button class="filter-btn" data-filter="transport" onclick="setFilter('transport')">🚌 Транспорт</button>
  <button class="filter-btn" data-filter="cafe" onclick="setFilter('cafe')">☕ Кафе</button>
  <button class="filter-btn" data-filter="shop" onclick="setFilter('shop')">🛍️ Магазин</button>
  <button class="filter-btn" data-filter="emergency" onclick="setFilter('emergency')">🆘 Допомога</button>
  <button class="filter-btn" data-filter="everyday" onclick="setFilter('everyday')">💬 Повсякдень</button>
  <button class="filter-btn" data-filter="social" onclick="setFilter('social')">👋 Знайомство</button>
  <button class="filter-btn" data-filter="plans" onclick="setFilter('plans')">📅 Плани</button>
</div>

<main>
  <div id="tab-browse"><div class="phrase-grid" id="phrase-grid"></div></div>
  <div id="tab-rules" style="display:none"><div id="rules-content"></div></div>
  <div id="tab-quiz" style="display:none">
    <div class="quiz-wrap">
      <div class="quiz-type-select">
        <button class="quiz-type-btn active" id="qt-en-ua" onclick="setQuizType('en-ua')">🇬🇧→🇺🇦 Переклад</button>
        <button class="quiz-type-btn" id="qt-ua-en" onclick="setQuizType('ua-en')">🇺🇦→🇬🇧 Вибір</button>
        <button class="quiz-type-btn" id="qt-scramble" onclick="setQuizType('scramble')">🧩 Конструктор</button>
        <button class="quiz-type-btn" id="qt-fill" onclick="setQuizType('fill')">🔤 Пропуск</button>
        <button class="quiz-type-btn" id="qt-type" onclick="setQuizType('type')">✏️ Письмо</button>
        <button class="quiz-type-btn" id="qt-situation" onclick="setQuizType('situation')">🎭 Ситуація</button>
        <button class="quiz-type-btn" id="qt-dialogue" onclick="setQuizType('dialogue')">💬 Діалог</button>
        <button class="quiz-type-btn" id="qt-flash" onclick="setQuizType('flash')">⚡ Флеш</button>
        <button class="quiz-type-btn" id="qt-pattern" onclick="setQuizType('pattern')">🔗 Патерн</button>
        <button class="quiz-type-btn" id="qt-marathon" onclick="setQuizType('marathon')">🏃 Марафон</button>
      </div>
      <div class="quiz-options-bar">
        <button type="button" class="quiz-errors-toggle" id="quiz-errors-toggle" onclick="toggleQuizErrorsOnly()" title="Тренуватись лише на фразах з помилками">
          <span id="quiz-errors-label">⚠️ Помилки</span>
        </button>
        <button type="button" class="quiz-new-toggle" id="quiz-new-toggle" onclick="toggleQuizNewOnly()" title="Тільки фрази, які ще не проходив у тесті">
          <span id="quiz-new-label">✨ Нові</span>
        </button>
        <label class="quiz-size-wrap" title="Кількість питань у тесті">
          <span>Питань:</span>
          <select id="quiz-size-select" class="quiz-size-select" onchange="setQuizSize(Number(this.value))">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15" selected>15</option>
            <option value="20">20</option>
            <option value="25">25</option>
            <option value="30">30</option>
          </select>
        </label>
      </div>
      <div class="quiz-card" id="quiz-card">
        <div class="quiz-progress" id="quiz-prog"></div>
        <div class="quiz-q" id="quiz-q"></div>
        <div class="quiz-hint" id="quiz-hint"></div>
        <div id="quiz-opts-area"></div>
        <div class="quiz-feedback" id="quiz-fb"></div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-ghost" id="quiz-next" onclick="nextQuestion()" style="display:none">Далі →</button>
          <button class="btn btn-primary" id="quiz-restart" onclick="startQuiz()" style="display:none">🔄 Новий тест</button>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-stats" style="display:none">
    <div class="stats-grid" id="stats-grid"></div>
    <div id="mastery-legend"></div>
    <h3 style="font-size:.9rem;color:var(--muted);margin:20px 0 10px;font-weight:500;">⏱️ Час відповіді по фразах (найповільніші)</h3>
    <div id="phrase-timing-stats" style="margin-bottom:24px"></div>
    <div id="sync-panel" style="margin-bottom:24px"></div>
    <h3 style="font-size:.9rem;color:var(--muted);margin-bottom:12px;font-weight:500;">По категоріях</h3>
    <div id="cat-stats"></div>
    <div style="margin-top:24px;"><button class="btn btn-ghost" onclick="resetProgress()">🗑️ Скинути прогрес</button></div>
  </div>
</main>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-num" id="m-num"></div>
    <div id="m-img"></div>
    <div class="modal-en" id="m-en"></div>
    <div class="modal-ua" id="m-ua"></div>
    <div class="modal-example" id="m-ex"></div>
    <div class="modal-tip" id="m-tip"></div>
    <div class="modal-tip" id="m-situation" style="background:rgba(61,214,140,.08);"></div>
    <div class="modal-rule" id="m-rule"></div>
    <div class="modal-actions">
      <button class="btn btn-nav" onclick="modalPrev()">← Назад</button>
      <button class="btn btn-nav" onclick="modalNext()">Вперед →</button>
      <button class="btn btn-success" id="m-learn-btn" onclick="toggleLearn()">✓ Знаю</button>
    </div>
  </div>
</div>

<div id="bundle-ok" style="display:none;position:fixed;bottom:8px;right:8px;font-size:.65rem;color:var(--green);opacity:.6;z-index:999">v23 OK</div>
<div id="load-error" style="display:none;position:fixed;inset:0;background:#0f1117;color:#f7706a;padding:40px;font-family:sans-serif;z-index:9999"></div>

<script src="./js/sync-config.js?v=23"></script>
<script src="./app.v23.js?v=23"></script>
<script src="./js/load-check.js" data-bundle="app.v23.js"></script>
</body>
</html>
